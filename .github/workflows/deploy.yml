name: Deploy Gym Management System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:4.4
        ports:
          - 27017:27017
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: gym-backend/package-lock.json
    
    - name: Install backend dependencies
      run: |
        cd gym-backend
        npm ci
    
    - name: Create test environment file
      run: |
        cd gym-backend
        echo "PORT=5000" > .env
        echo "MONGODB_URI=mongodb://localhost:27017/gym_test" >> .env
        echo "JWT_SECRET=test_jwt_secret_for_github_actions" >> .env
    
    - name: Wait for MongoDB
      run: |
        until nc -z localhost 27017; do
          echo "Waiting for MongoDB..."
          sleep 1
        done
    
    - name: Test backend connection
      run: |
        cd gym-backend
        timeout 30s npm start &
        sleep 10
        curl -f http://localhost:5000/api/health || echo "Backend health check failed"

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: gym-frontend/package-lock.json
    
    - name: Install frontend dependencies
      run: |
        cd gym-frontend
        npm ci
    
    - name: Build frontend
      run: |
        cd gym-frontend
        npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: gym-frontend/build/

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production
      run: |
        echo "🚀 Ready for deployment!"
        echo "✅ Backend tests passed"
        echo "✅ Frontend build successful"
        echo "📦 Artifacts ready for deployment"
        echo ""
        echo "Next steps for manual deployment:"
        echo "1. Set up your production server (VPS, AWS, Heroku, etc.)"
        echo "2. Configure environment variables:"
        echo "   - MONGODB_URI (production database)"
        echo "   - JWT_SECRET (secure random string)"
        echo "   - PORT (server port)"
        echo "3. Deploy backend: npm start in gym-backend/"
        echo "4. Deploy frontend: serve build files from gym-frontend/build/"